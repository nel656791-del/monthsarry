<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<title>Animated Envelope</title>

<style>
*{box-sizing:border-box; margin:0; padding:0;}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background: linear-gradient(135deg, #141e30, #243b55);
  font-family:Georgia, serif;
  perspective:1600px;
  flex-direction:column;
}

/* TITLE */
.title{
  position:absolute;
  top:40px;
  text-align:center;
  font-family:'Patrick Hand', cursive;
  color:#ffd700;
}
.title span{
  font-size:14px;
  display:block;
  opacity:.8;
}

.envelope{
  position:relative;
  width:min(92vw,380px);
  aspect-ratio:16/10;
  cursor:pointer;
  box-shadow:0 12px 24px rgba(0,0,0,0.35);
  transform-style:preserve-3d;
}

/* LETTER */
.letter{
  position:absolute;
  width:90%;
  padding:40px 16px 16px;
  max-height:80vh;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(0);
  background:repeating-linear-gradient(
    0deg,
    #fff8f3 0px,
    #fff8f3 2px,
    #efe2db 3px
  );
  border-radius:6px;
  padding:20px 16px 16px;
  overflow:auto;
  box-shadow:0 16px 22px rgba(0,0,0,.4);
  z-index:20;
  cursor:pointer;

  font-family:'Patrick Hand', cursive;
  font-size:18px;
  line-height:1.7;
  color:#3b1f1f;
  letter-spacing:.5px;

  opacity:0;
  transition:
    transform 0.6s cubic-bezier(.25,.8,.25,1),
    opacity 0.3s ease;
}

/* CLOSE BUTTON */
.close-btn{
  position:absolute;
  top:8px;
  right:10px; 
  border:none;
  background:#7a1624;
  color:#fff;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}
.close-btn:hover{opacity:.8;}



/* TYPEWRITER */
#text{
  white-space:pre-line;
}

/* ENVELOPE DESIGN */
.back{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,#7a1624,#4e0b12);
  clip-path:polygon(0 0,100% 0,50% 55%);
  z-index:0;
}
.bottom{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#4e0b12,#8b1a2b);
  clip-path:polygon(0 100%,100% 100%,50% 45%);
  z-index:6;
}
.left,.right{
  position:absolute;
  inset:0;
  background:#7a1624;
  z-index:7;
}
.left{clip-path:polygon(0 0,50% 50%,0 100%);}
.right{clip-path:polygon(100% 0,50% 50%,100% 100%);}

.top{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,#9b2333,#4e0b12);
  clip-path:polygon(0 0,100% 0,50% 55%);
  transform-origin:top;
  transition:transform 0.7s cubic-bezier(.4,0,.2,1);
  z-index:8;
}

/*  SEAL */
.seal{
  position:absolute;
  width:70px;
  height:70px;
  left:50%;
  top:54%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #ffd700, #8b0000 60%);
  z-index:9;
  box-shadow:
    inset 0 0 10px rgba(255,255,255,.5),
    inset 0 0 25px rgba(0,0,0,.6),
    0 12px 20px rgba(0,0,0,.6);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:26px;
  font-weight:bold;
  color:#fff;

  border:2px solid rgba(255,215,0,0.7);

  transition:
    opacity .3s ease,
    transform .3s ease;
}

.seal::before{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:50%;
  border:2px dashed rgba(255,215,0,0.6);
}

.seal span{
  font-family:Georgia, serif;
  text-shadow:
    0 0 5px rgba(0,0,0,.6),
    0 0 10px rgba(0,0,0,.5);
}

/* OPEN STATE */
.envelope.open .top{
  transform:rotateX(180deg);
}
.envelope.open .letter{
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
  transition-delay:0.6s;
}
.envelope.open .seal{
  opacity:0;
  transform:translate(-50%,-50%) scale(.6);
}
</style>
</head>

<body>

<h2 class="title">Happy 11th Monthsarry Adii 💖<br><span>May 29, 2026</span></h2>

<div class="envelope" id="env">
  <div class="letter" id="letter">

    <button class="close-btn" onclick="closeLetter()">✕</button>


    <div id="text"></div>

  </div>

  <div class="back"></div>
  <div class="bottom"></div>
  <div class="left"></div>
  <div class="right"></div>
  <div class="top"></div>
  <div class="seal"><span>J</span></div>
</div>

<script>
const env = document.getElementById("env");
const letter = document.getElementById("letter");
const textEl = document.getElementById("text");

const message = `happy 11th monthsary, Adii 🤍

grabe, 11 months na tayo… ang bilis pero at the same time ang dami na rin nating napagdaanan. kahit ldr tayo, hindi naging hadlang yun para maramdaman ko kung gaano ka ka-importante sakin. araw-araw kitang naiisip, kahit simpleng bagay, ikaw agad pumapasok sa isip ko.

thank you kasi lagi kang nandyan para sakin. sa mga oras na masaya ako, sinasabay mo ko sa saya, at sa mga oras na hindi ako okay, ikaw yung nagiging pahinga ko kahit malayo ka. sobrang na-aappreciate ko lahat ng effort mo, kahit minsan maliit na bagay lang yun, pero para sakin sobrang big deal na. hindi man tayo magkasama physically, pero ramdam ko yung pagmamahal mo sa paraan ng pag-aalaga mo sakin.

sorry rin kung minsan nagkukulang ako, kung may times na hindi kita naiintindihan agad or parang insensitive ako. hindi ko man laging napapakita ng tama, pero sobrang nag-aalala ako sayo at mahal na mahal kita. minsan napapaisip ako na sana mas marami pa akong magawa para mapasaya ka, lalo na pag may pinagdadaanan ka. gusto kitang samahan sa lahat ng laban mo, kahit hanggang chat at call lang muna.

hindi madali yung relasyon natin, lalo na may distance, may times na namimiss kita ng sobra na parang gusto ko na lang sumuko sa lungkot. pero kahit ganun, hindi kita kayang bitawan. ikaw yung pipiliin ko araw-araw, kahit gaano kahirap. kasi ikaw yung sigurado ako, ikaw yung gusto kong makasama hanggang dulo.

konting tiis na lang, love. darating din yung araw na hindi na lang tayo sa screen nagkikita. makakasama na kita, mahahawakan, mayayakap, at hindi na kailangan magpaalam agad. yun yung pinaka inaabangan ko, yung time na wala nang distance sa pagitan natin.

salamat sa 11 months na pagmamahal, pasensya, at pag-intindi. hindi ka lang girlfriend ko, ikaw yung future ko. at habang tumatagal, lalo akong sigurado sayo.

I love you so much, always 🤍🫶`;

let i = 0;
function typeWriter(){
  if(i < message.length){
    textEl.innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

env.addEventListener("click", (e)=>{
  if(!letter.contains(e.target)){
    env.classList.toggle("open");

    if(env.classList.contains("open")){
      textEl.innerHTML = "";
      i = 0;
      setTimeout(typeWriter, 700);
    }
  }
});

letter.addEventListener("click", ()=>{
  env.classList.remove("open");
});

function closeLetter(){
  env.classList.remove("open");
}
</script>

</body>
</html>
